<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>X Card — Match Predictions | TOP FAN VOTE</title>
  <link rel="stylesheet" href="x-card-export.css" />
</head>
<body>
  <div class="xcard">
    <div class="xcard__accent" aria-hidden="true"></div>
    <div class="xcard__glow xcard__glow--green" aria-hidden="true"></div>
    <div class="xcard__glow xcard__glow--gold" aria-hidden="true"></div>

    <div class="xcard__top">
      <p class="xcard__brand">TOP FAN VOTE</p>
      <span class="xcard__tag">Live fan poll</span>
    </div>

    <div>
      <h1 class="xcard__headline">Predict every World Cup 2026 group match</h1>
      <p class="xcard__sub">Tap your pick · see live fan % · 104 fixtures · groups A–L</p>
    </div>

    <div class="xcard__bottom">
      <p class="xcard__url">topfan.vote/matches</p>
      <p class="xcard__cta">Tap to vote →</p>
    </div>
  </div>
</body>
</html>
