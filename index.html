<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FIFA World Cup 2026 — Fan Vote Hub</title>
  <meta name="description" content="Vote for the World Cup 2026 winner and predict every match. Live fan polls — USA, Mexico, Canada 2026." />
  <link rel="canonical" href="https://pashavleon.github.io/vote/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="World Cup 2026 Fan Vote Hub" />
  <meta property="og:description" content="Pick the tournament winner and vote on every match — live fan polls." />
  <meta property="og:url" content="https://pashavleon.github.io/vote/" />
  <style>
    :root {
      --wc-green: #00A651;
      --wc-gold: #F5C518;
      --bg: #0a0e14;
      --card: #141b26;
      --text: #e8edf4;
      --muted: #8b9bb4;
      --border: #2a3548;
      --arsenal: #EF0107;
      --psg: #004170;
      --gold: #d4a853;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    .shell {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: #05080c;
      box-shadow: 0 0 80px rgba(0,0,0,0.45);
    }
    @media (min-width: 900px) { .shell { max-width: 960px; } }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 14, 20, 0.95);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--wc-gold);
      text-decoration: none;
      color: var(--wc-gold);
    }
    .topnav { display: flex; gap: 0.35rem; }
    .topnav a, .topnav span {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.3rem 0.55rem;
      border-radius: 6px;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid transparent;
      cursor: pointer;
    }
    .topnav a.is-active, .topnav span.is-active {
      color: var(--text);
      border-color: var(--border);
      background: var(--card);
    }

    .screen { display: none; padding-bottom: 2rem; }
    .screen.is-visible { display: block; }

    .event-hero {
      padding: 1.25rem 1rem 1rem;
      text-align: center;
      background: linear-gradient(180deg, rgba(0,166,81,0.12) 0%, transparent 100%);
    }
    .event-hero__tag {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--wc-green);
      font-weight: 700;
    }
    .event-hero__title { font-size: 1.35rem; font-weight: 800; margin: 0.35rem 0 0.25rem; }
    .event-hero__meta { font-size: 0.78rem; color: var(--muted); }

    .tabs {
      display: flex;
      margin: 0.75rem 1rem 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
    }
    .tabs button {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.65rem 0.5rem;
      cursor: pointer;
    }
    .tabs button.is-active {
      background: rgba(0, 166, 81, 0.18);
      color: var(--text);
    }

    .tab-panel { display: none; padding: 0.85rem 1rem 0; }
    .tab-panel.is-active { display: block; }
    .section-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin: 0.75rem 0 0.5rem;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }
    @media (min-width: 900px) { .team-grid { grid-template-columns: repeat(4, 1fr); } }

    .team-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 0.5rem;
      background: var(--card);
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      font: inherit;
      color: inherit;
      width: 100%;
    }
    .team-card:hover:not(:disabled) {
      border-color: var(--wc-green);
      transform: translateY(-2px);
    }
    .team-card.is-leading {
      border-color: var(--wc-gold);
      box-shadow: 0 0 20px rgba(245, 197, 24, 0.15);
    }
    .team-card.is-selected { border-color: var(--wc-green); background: rgba(0,166,81,0.08); }
    .team-card.is-disabled, .team-card:disabled { cursor: default; opacity: 0.85; }

    /* Volumetric flag (winner grid) */
    .flag-visual {
      position: relative;
      display: block;
      margin: 0.15rem auto 0.45rem;
      perspective: 140px;
    }
    .flag-visual--hero {
      width: 4.25rem;
      height: 2.75rem;
    }
    .flag-visual--sm {
      width: 2.5rem;
      height: 1.65rem;
      margin-bottom: 0.25rem;
    }
    .flag-visual__glow {
      position: absolute;
      inset: -35% -25%;
      background: radial-gradient(ellipse at 50% 60%, rgba(255,255,255,0.22) 0%, rgba(0,166,81,0.08) 35%, transparent 72%);
      filter: blur(10px);
      opacity: 0.9;
      pointer-events: none;
      z-index: 0;
    }
    .flag-visual__pole {
      position: absolute;
      left: -0.15rem;
      top: -0.1rem;
      bottom: -0.1rem;
      width: 0.2rem;
      border-radius: 2px 0 0 2px;
      background: linear-gradient(90deg, #3a3f48 0%, #9aa3b0 45%, #4a5059 100%);
      box-shadow: 1px 0 4px rgba(0,0,0,0.5);
      z-index: 2;
      transform: translateZ(4px);
    }
    .flag-visual__cloth {
      position: relative;
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 5px;
      overflow: hidden;
      transform: rotateY(-14deg) rotateX(6deg) translateZ(0);
      transform-style: preserve-3d;
      box-shadow:
        0 6px 16px rgba(0,0,0,0.55),
        0 2px 4px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.18);
      z-index: 1;
    }
    .flag-visual__img {
      display: block;
      width: 118%;
      height: 100%;
      max-width: none;
      margin-left: -9%;
      object-fit: cover;
      object-position: center;
      transform-origin: left center;
      animation: flagWave 5s ease-in-out infinite;
      -webkit-mask-image: radial-gradient(ellipse 88% 92% at 52% 48%, #000 52%, transparent 100%);
      mask-image: radial-gradient(ellipse 88% 92% at 52% 48%, #000 52%, transparent 100%);
    }
    .flag-visual__sheen {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        125deg,
        rgba(255,255,255,0.35) 0%,
        rgba(255,255,255,0.06) 28%,
        transparent 45%,
        rgba(0,0,0,0.12) 100%
      );
      pointer-events: none;
      mix-blend-mode: soft-light;
    }
    .flag-visual__edge-blur {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow:
        inset 0 0 14px 5px rgba(10,14,20,0.55),
        inset -6px 0 10px rgba(10,14,20,0.35);
      pointer-events: none;
    }
    .team-card:hover:not(:disabled) .flag-visual__cloth {
      transform: rotateY(-10deg) rotateX(4deg) translateY(-1px);
    }
    @keyframes flagWave {
      0%, 100% { transform: skewY(0deg) scaleX(1); }
      50% { transform: skewY(-1.2deg) scaleX(1.025); }
    }
    .flag-fallback { font-size: 1.75rem; line-height: 1; }

    .team-card__name { font-size: 0.72rem; font-weight: 700; margin: 0.35rem 0 0.25rem; display: block; }
    .team-card__pct { font-size: 0.85rem; font-weight: 800; color: var(--wc-gold); display: block; }
    .team-card__bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 0.35rem;
      overflow: hidden;
    }
    .team-card__bar span {
      display: block;
      height: 100%;
      background: var(--wc-green);
      border-radius: 2px;
    }

    .hub-message, .winner-total {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      margin-top: 0.65rem;
    }
    .hub-message { color: var(--wc-gold); }
    .hub-notice {
      font-size: 0.72rem;
      color: var(--muted);
      background: rgba(0,166,81,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.65rem;
      margin-bottom: 0.65rem;
      line-height: 1.4;
    }
    .match-card__vote--readonly .vote-chip {
      cursor: default;
      opacity: 0.55;
    }
    .hub-empty, .hub-loading { font-size: 0.78rem; color: var(--muted); padding: 0.75rem 0; text-align: center; }

    .matches-toolbar {
      position: relative;
      z-index: 50;
      margin-bottom: 0.5rem;
    }
    .stage-dropdown {
      position: relative;
      width: 100%;
      margin-bottom: 0.75rem;
    }
    .stage-dropdown.is-open::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 20, 0.72);
      z-index: 40;
    }
    .stage-dropdown__trigger {
      position: relative;
      z-index: 52;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      font: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.75rem 0.85rem;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }
    .stage-dropdown__trigger:hover,
    .stage-dropdown.is-open .stage-dropdown__trigger {
      border-color: var(--wc-green);
      background: rgba(0, 166, 81, 0.08);
    }
    .stage-dropdown__icon {
      flex-shrink: 0;
      color: var(--wc-gold);
    }
    .stage-dropdown__text {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    .stage-dropdown__stage {
      font-size: 0.85rem;
      font-weight: 700;
    }
    .stage-dropdown__hint {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--muted);
    }
    .stage-dropdown__chevron {
      flex-shrink: 0;
      color: var(--muted);
      transition: transform 0.2s;
    }
    .stage-dropdown.is-open .stage-dropdown__chevron {
      transform: rotate(180deg);
    }
    .stage-dropdown__menu {
      position: absolute;
      z-index: 51;
      top: calc(100% + 0.35rem);
      left: 0;
      right: 0;
      border: 1px solid rgba(0, 166, 81, 0.45);
      border-radius: var(--radius);
      background: #121820;
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.85),
        0 18px 48px rgba(0, 0, 0, 0.75);
      overflow: hidden;
      max-height: min(18rem, 60vh);
      overflow-y: auto;
    }
    .stage-dropdown__menu[hidden] { display: none; }
    .stage-dropdown__item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--border);
      background: #121820;
      color: var(--text);
      font: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.7rem 0.85rem;
      cursor: pointer;
      text-align: left;
    }
    .stage-dropdown__item:last-child { border-bottom: none; }
    .stage-dropdown__item:hover:not(:disabled) {
      background: #1a2836;
    }
    .stage-dropdown__item.is-selected {
      background: #1e3a2f;
      color: var(--text);
    }
    .stage-dropdown__item.is-past { opacity: 0.85; }
    .stage-dropdown__item.is-future,
    .stage-dropdown__item:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .stage-dropdown__badge {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .stage-dropdown__badge--live { color: var(--wc-gold); }
    .stage-dropdown__badge--soon { color: var(--muted); }
    .stage-filter__live,
    .stage-filter__soon {
      display: inline-block;
      margin-left: 0.25rem;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      vertical-align: middle;
    }
    .voting-phase {
      display: flex;
      align-items: flex-start;
      gap: 0.45rem;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 0.65rem;
      line-height: 1.35;
    }
    .voting-phase__indicator {
      flex-shrink: 0;
      width: 0.5rem;
      height: 0.5rem;
      margin-top: 0.2rem;
      border-radius: 50%;
      background: var(--wc-green);
      box-shadow: 0 0 0 3px rgba(0, 166, 81, 0.25);
    }
    .voting-phase__text strong { color: var(--text); }
    .hub-notice--live {
      border-color: rgba(0, 166, 81, 0.35);
      background: rgba(0, 166, 81, 0.08);
    }
    .hub-notice--past {
      border-color: rgba(245, 197, 24, 0.25);
      background: rgba(245, 197, 24, 0.06);
    }

    .match-list { display: flex; flex-direction: column; gap: 0.55rem; }
    .match-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      overflow: hidden;
    }
    .match-card.is-live { border-color: rgba(245, 197, 24, 0.5); }
    .match-card.is-closed { opacity: 0.85; }
    .match-card__head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 0.65rem;
      font-size: 0.65rem;
      color: var(--muted);
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid var(--border);
    }
    .match-card__badge { font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .match-card__badge--open { color: var(--wc-green); }
    .match-card__badge--soon { color: var(--wc-gold); }
    .match-card__badge--closed { color: var(--muted); }
    .match-card__body {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.35rem;
      padding: 0.75rem 0.65rem;
    }
    .match-team { text-align: center; font-size: 0.72rem; font-weight: 700; }
    .match-team__flag { font-size: 1.5rem; display: block; margin-bottom: 0.2rem; }
    .match-vs { font-size: 0.65rem; font-weight: 800; color: var(--muted); }
    .match-card__vote {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.35rem;
      padding: 0 0.65rem 0.65rem;
    }
    .match-card__vote--two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .vote-chip {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0.3rem;
      background: #0a0e14;
      font: inherit;
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      text-align: center;
      min-width: 0;
      line-height: 1.25;
    }
    .vote-chip:hover:not(:disabled) { border-color: var(--wc-green); }
    .vote-chip.is-selected { border-color: var(--wc-green); background: rgba(0,166,81,0.1); }
    .vote-chip:disabled { opacity: 0.7; cursor: default; }
    .vote-chip small { display: block; font-size: 0.62rem; color: var(--wc-gold); margin-top: 0.15rem; }

    .group-block {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.5rem;
      overflow: hidden;
    }
    .group-block summary {
      cursor: pointer;
      list-style: none;
      padding: 0.65rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 700;
      background: var(--card);
      display: flex;
      justify-content: space-between;
    }
    .group-block summary::-webkit-details-marker { display: none; }
    .group-block summary::after { content: "+"; color: var(--wc-gold); }
    .group-block[open] summary::after { content: "−"; }
    .group-block__inner {
      padding: 0.5rem 0.65rem 0.65rem;
      border-top: 1px solid var(--border);
    }

    .archive-intro {
      padding: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
    .archive-card {
      margin: 0 1rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      overflow: hidden;
    }
    .archive-card__banner {
      height: 72px;
      background: linear-gradient(135deg, var(--psg) 40%, var(--arsenal));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .archive-card__body { padding: 0.75rem; }
    .archive-card__title { font-size: 0.9rem; font-weight: 700; }
    .archive-card__result { font-size: 0.78rem; color: var(--gold); margin: 0.25rem 0 0.5rem; }
    .archive-card__stats {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.35rem;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .archive-card__link {
      display: block;
      text-align: center;
      padding: 0.55rem;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--wc-gold);
      border-top: 1px solid var(--border);
      text-decoration: none;
    }

  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="logo" href="./">FanVote</a>
      <nav class="topnav" aria-label="Sections">
        <span class="is-active" data-nav="home">Active</span>
        <a href="#" data-nav="archive">Archive</a>
      </nav>
    </header>

    <section class="screen is-visible" id="screen-home">
      <div class="event-hero">
        <p class="event-hero__tag">Featured event</p>
        <h1 class="event-hero__title" id="event-title">FIFA World Cup 2026</h1>
        <p class="event-hero__meta" id="event-meta">USA · Mexico · Canada</p>
      </div>

      <div class="tabs" role="tablist">
        <button type="button" class="is-active" data-tab="winner">Tournament winner</button>
        <button type="button" data-tab="matches">Matches</button>
      </div>

      <div class="tab-panel is-active" id="panel-winner">
        <p class="section-label">One pick for the whole tournament</p>
        <div class="team-grid" id="hub-winner-grid">
          <p class="hub-loading">Loading teams…</p>
        </div>
        <p class="winner-total" id="winner-total"></p>
        <p class="hub-message" id="winner-message" hidden></p>
      </div>

      <div class="tab-panel" id="panel-matches">
        <p class="section-label">Match polls by stage</p>
        <div class="matches-toolbar">
          <div class="voting-phase" id="voting-phase-label" aria-live="polite">
            <span class="voting-phase__indicator" aria-hidden="true"></span>
            <span class="voting-phase__text">Active voting: <strong>Groups</strong></span>
          </div>
          <div class="stage-dropdown" id="stage-dropdown">
            <button
              type="button"
              class="stage-dropdown__trigger"
              id="stage-dropdown-trigger"
              aria-expanded="false"
              aria-haspopup="listbox"
              aria-controls="stage-filter"
            >
              <svg class="stage-dropdown__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M4 7h16M4 12h16M4 17h16"/>
              </svg>
              <span class="stage-dropdown__text">
                <span class="stage-dropdown__stage" id="stage-dropdown-label">Groups</span>
                <span class="stage-dropdown__hint">Switch tournament stage</span>
              </span>
              <svg class="stage-dropdown__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M6 9l6 6 6-6"/>
              </svg>
            </button>
            <div class="stage-dropdown__menu" id="stage-filter" role="listbox" hidden aria-label="Tournament stage"></div>
          </div>
        </div>
        <div id="matches-container">
          <p class="hub-loading">Loading matches…</p>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-archive">
      <p class="archive-intro">Past events and fan poll results</p>
      <div id="archive-list">
        <p class="hub-loading">Loading archive…</p>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/flags.js"></script>
  <script src="js/hub.js"></script>
</body>
</html>
