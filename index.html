<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FIFA World Cup 2026 — Fan Vote Hub</title>
  <meta name="description" content="Vote for the World Cup 2026 winner and predict every match. Live fan polls — USA, Mexico, Canada 2026." />
  <link rel="canonical" href="https://pashavleon.github.io/vote/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="World Cup 2026 Fan Vote Hub" />
  <meta property="og:description" content="Pick the tournament winner and vote on every match — live fan polls." />
  <meta property="og:url" content="https://pashavleon.github.io/vote/" />
  <link rel="stylesheet" href="css/hub.css" />
</head>
<body data-page="home">
  <div class="shell shell--home">
    <header class="topbar">
      <a class="logo" href="index.html">FanVote</a>
      <nav class="topnav topnav--split" aria-label="Site">
        <a href="arch.html" class="topnav-arch">Archive</a>
      </nav>
    </header>

    <main class="page-main home-main">
      <section class="home-stage" aria-label="World Cup 2026 fan polls">
        <a class="portal-card portal-card--side portal-card--left" href="winner.html">
          <div class="portal-card__visual portal-card__visual--winner">
            <svg class="portal-trophy portal-trophy--sm" viewBox="0 0 64 64" fill="none" aria-hidden="true">
              <path d="M18 8h28v10c0 10-4 16-14 18v6h8v6H24v-6h8v-6C22 34 18 28 18 18V8z" fill="currentColor" opacity="0.9"/>
              <path d="M14 8H8v8c0 6 3 10 8 10M50 8h6v8c0 6-3 10-8 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <rect x="22" y="50" width="20" height="6" rx="1" fill="currentColor"/>
            </svg>
          </div>
          <div class="portal-card__body">
            <h2 class="portal-card__title">Tournament winner</h2>
            <p class="portal-card__desc">One pick · 48 teams</p>
            <span class="portal-card__cta">Vote →</span>
          </div>
        </a>

        <div class="home-center">
          <div class="home-center__art">
            <img class="home-center__wc" src="assets/wc.avif" alt="" decoding="async" />
            <img class="home-center__trophy" src="assets/wc-trophy.png" alt="" decoding="async" />
          </div>
          <div class="home-center__copy">
            <p class="home-center__tag">Unofficial fan poll</p>
            <h1 class="home-center__title" id="home-event-title">FIFA World Cup 2026</h1>
            <p class="home-center__meta" id="home-event-meta">USA · Mexico · Canada</p>
            <p class="home-center__disclaimer">Not affiliated with FIFA</p>
          </div>
        </div>

        <a class="portal-card portal-card--side portal-card--right" href="matches.html">
          <div class="portal-card__visual portal-card__visual--matches">
            <div class="portal-bracket portal-bracket--sm" aria-hidden="true">
              <span>A</span><span>B</span><span>C</span><span>D</span>
              <span>E</span><span>F</span><span>G</span><span>H</span>
              <span>I</span><span>J</span><span>K</span><span>L</span>
            </div>
          </div>
          <div class="portal-card__body">
            <h2 class="portal-card__title">Match polls</h2>
            <p class="portal-card__desc">Group stage open</p>
            <span class="portal-card__cta">Pick matches →</span>
          </div>
        </a>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/hub.js"></script>
</body>
</html>
