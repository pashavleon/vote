<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FIFA World Cup 2026 — Fan Vote Hub</title>
  <meta name="description" content="Vote for the World Cup 2026 winner and predict every match. Live fan polls — USA, Mexico, Canada 2026." />
  <link rel="canonical" href="https://pashavleon.github.io/vote/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="World Cup 2026 Fan Vote Hub" />
  <meta property="og:description" content="Pick the tournament winner and vote on every match — live fan polls." />
  <meta property="og:url" content="https://pashavleon.github.io/vote/" />
  <style>
    :root {
      --wc-green: #00A651;
      --wc-gold: #F5C518;
      --bg: #0a0e14;
      --card: #141b26;
      --text: #e8edf4;
      --muted: #8b9bb4;
      --border: #2a3548;
      --arsenal: #EF0107;
      --psg: #004170;
      --gold: #d4a853;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    .shell {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: #05080c;
      box-shadow: 0 0 80px rgba(0,0,0,0.45);
    }
    @media (min-width: 900px) { .shell { max-width: 960px; } }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 14, 20, 0.95);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--wc-gold);
      text-decoration: none;
      color: var(--wc-gold);
    }
    .topnav { display: flex; gap: 0.35rem; }
    .topnav a, .topnav span {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.3rem 0.55rem;
      border-radius: 6px;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid transparent;
      cursor: pointer;
    }
    .topnav a.is-active, .topnav span.is-active {
      color: var(--text);
      border-color: var(--border);
      background: var(--card);
    }

    .screen { display: none; padding-bottom: 2rem; }
    .screen.is-visible { display: block; }

    .event-hero {
      padding: 1.25rem 1rem 1rem;
      text-align: center;
      background: linear-gradient(180deg, rgba(0,166,81,0.12) 0%, transparent 100%);
    }
    .event-hero__tag {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--wc-green);
      font-weight: 700;
    }
    .event-hero__title { font-size: 1.35rem; font-weight: 800; margin: 0.35rem 0 0.25rem; }
    .event-hero__meta { font-size: 0.78rem; color: var(--muted); }

    .tabs {
      display: flex;
      margin: 0.75rem 1rem 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
    }
    .tabs button {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.65rem 0.5rem;
      cursor: pointer;
    }
    .tabs button.is-active {
      background: rgba(0, 166, 81, 0.18);
      color: var(--text);
    }

    .tab-panel { display: none; padding: 0.85rem 1rem 0; }
    .tab-panel.is-active { display: block; }
    .section-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin: 0.75rem 0 0.5rem;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }
    @media (min-width: 900px) { .team-grid { grid-template-columns: repeat(4, 1fr); } }

    .team-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 0.5rem;
      background: var(--card);
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      font: inherit;
      color: inherit;
      width: 100%;
    }
    .team-card:hover:not(:disabled) {
      border-color: var(--wc-green);
      transform: translateY(-2px);
    }
    .team-card.is-leading {
      border-color: var(--wc-gold);
      box-shadow: 0 0 20px rgba(245, 197, 24, 0.15);
    }
    .team-card.is-selected { border-color: var(--wc-green); background: rgba(0,166,81,0.08); }
    .team-card.is-disabled, .team-card:disabled { cursor: default; opacity: 0.85; }
    .team-card__flag { font-size: 1.75rem; line-height: 1; display: block; }
    .team-card__name { font-size: 0.72rem; font-weight: 700; margin: 0.35rem 0 0.25rem; display: block; }
    .team-card__pct { font-size: 0.85rem; font-weight: 800; color: var(--wc-gold); display: block; }
    .team-card__bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 0.35rem;
      overflow: hidden;
    }
    .team-card__bar span {
      display: block;
      height: 100%;
      background: var(--wc-green);
      border-radius: 2px;
    }

    .hub-message, .winner-total {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      margin-top: 0.65rem;
    }
    .hub-message { color: var(--wc-gold); }
    .hub-empty, .hub-loading { font-size: 0.78rem; color: var(--muted); padding: 0.75rem 0; text-align: center; }

    .stage-filter {
      display: flex;
      gap: 0.35rem;
      overflow-x: auto;
      padding-bottom: 0.35rem;
      scrollbar-width: none;
    }
    .stage-filter::-webkit-scrollbar { display: none; }
    .stage-filter button {
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font: inherit;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      cursor: pointer;
    }
    .stage-filter button.is-active {
      border-color: var(--wc-green);
      color: var(--text);
      background: rgba(0, 166, 81, 0.15);
    }

    .match-list { display: flex; flex-direction: column; gap: 0.55rem; }
    .match-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      overflow: hidden;
    }
    .match-card.is-live { border-color: rgba(245, 197, 24, 0.5); }
    .match-card.is-closed { opacity: 0.85; }
    .match-card__head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.45rem 0.65rem;
      font-size: 0.65rem;
      color: var(--muted);
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid var(--border);
    }
    .match-card__badge { font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .match-card__badge--open { color: var(--wc-green); }
    .match-card__badge--soon { color: var(--wc-gold); }
    .match-card__badge--closed { color: var(--muted); }
    .match-card__body {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.35rem;
      padding: 0.75rem 0.65rem;
    }
    .match-team { text-align: center; font-size: 0.72rem; font-weight: 700; }
    .match-team__flag { font-size: 1.5rem; display: block; margin-bottom: 0.2rem; }
    .match-vs { font-size: 0.65rem; font-weight: 800; color: var(--muted); }
    .match-card__vote {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.35rem;
      padding: 0 0.65rem 0.65rem;
    }
    .vote-chip {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem;
      background: #0a0e14;
      font: inherit;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      text-align: center;
    }
    .vote-chip:hover:not(:disabled) { border-color: var(--wc-green); }
    .vote-chip.is-selected { border-color: var(--wc-green); background: rgba(0,166,81,0.1); }
    .vote-chip:disabled { opacity: 0.7; cursor: default; }
    .vote-chip small { display: block; font-size: 0.62rem; color: var(--wc-gold); margin-top: 0.15rem; }

    .group-block {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.5rem;
      overflow: hidden;
    }
    .group-block summary {
      cursor: pointer;
      list-style: none;
      padding: 0.65rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 700;
      background: var(--card);
      display: flex;
      justify-content: space-between;
    }
    .group-block summary::-webkit-details-marker { display: none; }
    .group-block summary::after { content: "+"; color: var(--wc-gold); }
    .group-block[open] summary::after { content: "−"; }
    .group-block__inner {
      padding: 0.5rem 0.65rem 0.65rem;
      border-top: 1px solid var(--border);
    }

    .archive-intro {
      padding: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
    .archive-card {
      margin: 0 1rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      overflow: hidden;
    }
    .archive-card__banner {
      height: 72px;
      background: linear-gradient(135deg, var(--psg) 40%, var(--arsenal));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .archive-card__body { padding: 0.75rem; }
    .archive-card__title { font-size: 0.9rem; font-weight: 700; }
    .archive-card__result { font-size: 0.78rem; color: var(--gold); margin: 0.25rem 0 0.5rem; }
    .archive-card__stats {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.35rem;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .archive-card__link {
      display: block;
      text-align: center;
      padding: 0.55rem;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--wc-gold);
      border-top: 1px solid var(--border);
      text-decoration: none;
    }

    @media (min-width: 900px) {
      .matches-layout {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 1rem;
        padding: 0 1rem;
      }
      .stage-filter--side { flex-direction: column; overflow: visible; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="logo" href="./">FanVote</a>
      <nav class="topnav" aria-label="Sections">
        <span class="is-active" data-nav="home">Active</span>
        <a href="#" data-nav="archive">Archive</a>
      </nav>
    </header>

    <section class="screen is-visible" id="screen-home">
      <div class="event-hero">
        <p class="event-hero__tag">Featured event</p>
        <h1 class="event-hero__title" id="event-title">FIFA World Cup 2026</h1>
        <p class="event-hero__meta" id="event-meta">USA · Mexico · Canada</p>
      </div>

      <div class="tabs" role="tablist">
        <button type="button" class="is-active" data-tab="winner">Tournament winner</button>
        <button type="button" data-tab="matches">Matches</button>
      </div>

      <div class="tab-panel is-active" id="panel-winner">
        <p class="section-label">One pick for the whole tournament</p>
        <div class="team-grid" id="hub-winner-grid">
          <p class="hub-loading">Loading teams…</p>
        </div>
        <p class="winner-total" id="winner-total"></p>
        <p class="hub-message" id="winner-message" hidden></p>
      </div>

      <div class="tab-panel" id="panel-matches">
        <p class="section-label">Pick the winner of each match</p>
        <div class="matches-layout">
          <div class="stage-filter stage-filter--side" id="stage-filter">
            <button type="button" class="is-active" data-stage="group">Groups</button>
            <button type="button" data-stage="r32">Round of 32</button>
            <button type="button" data-stage="r16">Round of 16</button>
            <button type="button" data-stage="qf">Quarter-finals</button>
            <button type="button" data-stage="sf">Semi-finals</button>
            <button type="button" data-stage="final">Final</button>
          </div>
          <div id="matches-container">
            <p class="hub-loading">Loading matches…</p>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-archive">
      <p class="archive-intro">Past events and fan poll results</p>
      <div id="archive-list">
        <p class="hub-loading">Loading archive…</p>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/hub.js"></script>
</body>
</html>
