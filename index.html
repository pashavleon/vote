<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FIFA World Cup 2026 — Fan Vote Hub</title>
  <meta name="description" content="Vote for the World Cup 2026 winner and predict every match. Live fan polls — USA, Mexico, Canada 2026." />
  <link rel="canonical" href="https://pashavleon.github.io/vote/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="World Cup 2026 Fan Vote Hub" />
  <meta property="og:description" content="Pick the tournament winner and vote on every match — live fan polls." />
  <meta property="og:url" content="https://pashavleon.github.io/vote/" />
  <link rel="stylesheet" href="css/hub.css" />
</head>
<body data-page="home">
  <div class="shell shell--home">
    <header class="topbar">
      <a class="logo" href="index.html">FanVote</a>
      <nav class="topnav topnav--split" aria-label="Site">
        <a href="arch.html" class="topnav-arch">Archive</a>
      </nav>
    </header>

    <main class="page-main home-main">
      <section class="home-stage" aria-label="World Cup 2026 fan polls">
        <div class="home-stage__center">
          <div class="home-stage__backdrop" aria-hidden="true">
            <img class="home-stage__trophy" src="assets/wc-trophy.png" alt="" decoding="async" />
          </div>
          <div class="home-stage__copy">
            <p class="home-stage__tag">Unofficial fan poll</p>
            <h1 class="home-stage__title" id="home-event-title">FIFA World Cup 2026</h1>
            <p class="home-stage__meta" id="home-event-meta">USA · Mexico · Canada</p>
            <p class="home-stage__disclaimer">Not affiliated with FIFA</p>
          </div>
        </div>

        <a class="portal-chip portal-chip--winner portal-btn--left" href="winner.html">
          <span class="portal-chip__frame">
            <img
              class="portal-chip__img"
              src="assets/winner-silhouettes-800.jpg"
              srcset="assets/winner-silhouettes-800.jpg 800w, assets/winner-silhouettes-1280.jpg 1280w"
              sizes="(min-width: 768px) min(52vw, 28rem), 100vw"
              alt=""
              width="800"
              height="533"
              decoding="async"
            />
          </span>
          <span class="portal-chip__caption">
            <span class="portal-chip__title">Tournament winner</span>
            <span class="portal-chip__desc">One pick · 48 teams</span>
            <span class="portal-chip__cta">Vote now</span>
          </span>
        </a>

        <a class="portal-chip portal-chip--matches portal-btn--right" href="matches.html">
          <span class="portal-chip__frame">
            <img
              class="portal-chip__img"
              src="assets/groups-tilted-800.jpg"
              srcset="assets/groups-tilted-800.jpg 800w, assets/groups-tilted-1280.jpg 1280w"
              sizes="(min-width: 768px) min(52vw, 28rem), 100vw"
              alt=""
              width="800"
              height="533"
              decoding="async"
            />
          </span>
          <span class="portal-chip__caption">
            <span class="portal-chip__title">Match polls</span>
            <span class="portal-chip__desc">Group stage · live</span>
            <span class="portal-chip__cta">Pick matches</span>
          </span>
        </a>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/hub.js"></script>
</body>
</html>
