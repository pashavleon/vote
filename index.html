<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Финал ЛЧ 2026 — голосование</title>
  <meta name="description" content="Fan poll: кто выиграет финал Лиги чемпионов в Будапеште?" />
  <style>
    :root {
      --arsenal: #EF0107;
      --psg: #004170;
      --gold: #d4a853;
      --bg: #0a0e14;
      --card: #141b26;
      --text: #e8edf4;
      --muted: #8b9bb4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .page {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: #05080c;
      min-height: 100vh;
      box-shadow: 0 0 80px rgba(0,0,0,0.5);
    }
    .hero-stack {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-areas: "arsenal" "vs" "psg";
      padding: 0 0.5rem;
    }
    .hero-art--arsenal { grid-area: arsenal; --team: var(--arsenal); --team-glow: rgba(239, 1, 7, 0.55); }
    .hero-art--psg { grid-area: psg; --team: var(--psg); --team-glow: rgba(0, 65, 112, 0.65); }
    .vs-row { grid-area: vs; }

    /* Кликабельная карточка-арт */
    .hero-art {
      display: block;
      width: 100%;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .hero-art:focus { outline: none; }
    .hero-art:focus-visible .hero-art__frame {
      outline: 2px solid var(--gold);
      outline-offset: 3px;
    }
    .hero-art__frame {
      position: relative;
      display: block;
      border-radius: 12px;
      overflow: hidden;
      background: #05080c;
      border: 2px solid transparent;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }
    .hero-art__frame::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 100%, var(--team-glow), transparent 70%);
      transition: opacity 0.35s ease;
    }
    .hero-art__shine {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      background: linear-gradient(
        105deg,
        transparent 35%,
        rgba(255, 255, 255, 0.12) 45%,
        rgba(255, 255, 255, 0.28) 50%,
        rgba(255, 255, 255, 0.12) 55%,
        transparent 65%
      );
      transform: translateX(-120%);
    }
    .hero-art__ring {
      position: absolute;
      inset: 50%;
      width: 20px;
      height: 20px;
      margin: -10px 0 0 -10px;
      z-index: 4;
      pointer-events: none;
      border-radius: 50%;
      border: 3px solid var(--gold);
      opacity: 0;
      transform: scale(0.3);
    }
    .hero-art__check {
      position: absolute;
      top: 0.65rem;
      right: 0.65rem;
      z-index: 5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--gold);
      color: #111;
      font-size: 1.1rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0) rotate(-45deg);
      box-shadow: 0 0 24px rgba(212, 168, 83, 0.7);
    }
    .img-full {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      background: #05080c;
      transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), filter 0.4s ease;
    }
    .side-label {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      z-index: 6;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.65);
    }
    .side-label.arsenal { color: #ff8a8a; }
    .side-label.psg { color: #8ec5ff; }

    /* —— Hover (только устройства с мышью) —— */
    @media (hover: hover) and (pointer: fine) {
      .page:not(.has-voted) .hero-art:not(:disabled):hover .hero-art__frame {
        border-color: color-mix(in srgb, var(--team) 70%, var(--gold));
        box-shadow:
          0 0 0 1px color-mix(in srgb, var(--team) 40%, transparent),
          0 12px 40px var(--team-glow),
          0 0 60px color-mix(in srgb, var(--gold) 25%, transparent);
        animation: hero-hover-float 1.4s ease-in-out infinite alternate;
      }
      .page:not(.has-voted) .hero-art:not(:disabled):hover .hero-art__frame::before {
        opacity: 1;
      }
      .page:not(.has-voted) .hero-art:not(:disabled):hover .hero-art__shine {
        opacity: 1;
        animation: hero-shine-sweep 0.85s ease forwards;
      }
      .page:not(.has-voted) .hero-art:not(:disabled):hover .img-full {
        transform: scale(1.03);
        filter: brightness(1.08) saturate(1.12);
      }
    }

    /* Тап на тач-экране */
    @media (hover: none) {
      .page:not(.has-voted) .hero-art:not(:disabled):active .hero-art__frame {
        transform: scale(0.98);
        border-color: var(--team);
      }
    }

    /* —— Выбор / после голоса —— */
    .hero-art.is-animating-vote .hero-art__frame {
      animation: hero-vote-impact 0.55s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    }
    .hero-art.is-animating-vote .hero-art__ring {
      animation: hero-ring-burst 0.75s ease-out forwards;
    }
    .hero-art.is-selected .hero-art__frame {
      border-color: var(--gold);
      box-shadow:
        0 0 0 2px var(--gold),
        0 0 48px var(--team-glow),
        0 16px 48px rgba(0, 0, 0, 0.5);
      animation: hero-selected-glow 2s ease-in-out infinite alternate;
    }
    .hero-art.is-selected .img-full {
      filter: brightness(1.1) saturate(1.15);
    }
    .hero-art.is-selected .hero-art__check {
      animation: hero-check-pop 0.5s cubic-bezier(0.34, 1.5, 0.64, 1) 0.15s forwards;
    }
    .hero-art.is-dimmed {
      cursor: default;
      pointer-events: none;
    }
    .hero-art.is-dimmed .hero-art__frame {
      border-color: transparent;
      box-shadow: none;
      animation: none;
    }
    .hero-art.is-dimmed .img-full {
      filter: grayscale(0.65) brightness(0.45);
      transform: scale(0.97);
    }
    .hero-art:disabled {
      cursor: default;
    }

    @keyframes hero-hover-float {
      from { transform: translateY(0); }
      to { transform: translateY(-4px); }
    }
    @keyframes hero-shine-sweep {
      to { transform: translateX(120%); }
    }
    @keyframes hero-vote-impact {
      0% { transform: scale(1); }
      35% { transform: scale(0.96); }
      70% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    @keyframes hero-ring-burst {
      0% { opacity: 0.9; transform: scale(0.3); }
      100% { opacity: 0; transform: scale(14); }
    }
    @keyframes hero-check-pop {
      to { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes hero-selected-glow {
      from { box-shadow: 0 0 0 2px var(--gold), 0 0 32px var(--team-glow); }
      to { box-shadow: 0 0 0 2px var(--gold), 0 0 56px var(--team-glow), 0 0 24px rgba(212, 168, 83, 0.35); }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-art__frame,
      .img-full,
      .hero-art__shine,
      .hero-art.is-selected .hero-art__frame {
        animation: none !important;
        transition: none;
      }
      .page:not(.has-voted) .hero-art:not(:disabled):hover .img-full {
        transform: none;
      }
    }

    .head {
      text-align: center;
      padding: 1.25rem 1rem 0.35rem;
    }
    .head h4 {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .head p { font-size: 1.15rem; font-weight: 700; margin-top: 0.25rem; }
    .vote-hint {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      padding: 0 1rem 0.75rem;
    }
    .page.has-voted .vote-hint { display: none; }
    .vs-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.5rem 1rem;
      background: #0a0e14;
    }
    .vs-row::before, .vs-row::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .vs-badge {
      width: 48px;
      height: 48px;
      background: var(--gold);
      color: #111;
      font-weight: 800;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.4s ease;
    }
    .page.has-voted .vs-badge {
      animation: vs-pulse 1.5s ease-in-out infinite alternate;
    }
    @keyframes vs-pulse {
      to { transform: scale(1.08); box-shadow: 0 0 20px rgba(212, 168, 83, 0.5); }
    }
    .bar-track {
      height: 8px;
      margin: 0.75rem 1rem 0;
      background: var(--psg);
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 50%;
      background: var(--arsenal);
      border-radius: 4px;
      transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .stats {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .vote-total {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      padding: 0 1rem 0.75rem;
    }
    .vote-message {
      margin: 0 1rem 1rem;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      font-size: 0.8rem;
      text-align: center;
      background: var(--card);
    }
    .vote-message[hidden] { display: none; }
    .vote-message--warn { border: 1px solid #6b5a2e; color: var(--gold); }
    .vote-message--error { border: 1px solid #6b2e2e; color: #ff8a8a; }
    .vote-message--success { border: 1px solid #2e6b3a; color: #8aff9a; }
    .vote-message--info { border: 1px solid #2e4a6b; color: #8ab4ff; }
    .footer {
      text-align: center;
      font-size: 0.7rem;
      color: #4a5568;
      padding: 0 1rem 2rem;
    }

    @media (min-width: 840px) {
      .page { max-width: min(1200px, 96vw); }
      .head { padding: 1.5rem 2rem 0.5rem; }
      .head p { font-size: 1.35rem; }
      .hero-stack {
        grid-template-columns: 1fr auto 1fr;
        grid-template-areas: "arsenal vs psg";
        align-items: stretch;
        gap: 0.25rem;
      }
      .hero-art .img-full {
        max-height: min(52vh, 520px);
      }
      .hero-art--arsenal .img-full { object-position: center right; }
      .hero-art--psg .img-full { object-position: center left; }
      .vs-row {
        flex-direction: column;
        padding: 1rem 0.5rem;
        min-width: 72px;
        background: linear-gradient(180deg, #0a0e14, #141b26 50%, #0a0e14);
      }
      .vs-row::before, .vs-row::after {
        width: 1px;
        height: auto;
        flex: 1;
        min-height: 24px;
        background: linear-gradient(180deg, transparent, var(--gold), transparent);
      }
      .vs-badge { width: 56px; height: 56px; font-size: 1.1rem; }
      .bar-track, .stats, .vote-total, .vote-message, .vote-hint, .footer {
        max-width: 640px;
        margin-left: auto;
        margin-right: auto;
      }
      .bar-track { width: calc(100% - 2rem); }
    }

    @media (max-width: 839px) and (orientation: portrait) {
      .hero-stack {
        grid-template-areas: "arsenal" "vs" "psg";
      }
    }
  </style>
</head>
<body>
  <div class="page landing-a" data-vote-root data-vote-poll-id="ucl-final-2026">
    <header class="head">
      <h4>Финал ЛЧ · 30 мая · Будапешт</h4>
      <p>Кто поднимет кубок?</p>
    </header>
    <p class="vote-hint">Нажми на арт своей команды — голос сразу засчитается</p>

    <div class="hero-stack">
      <button type="button" class="hero-art hero-art--arsenal" data-vote-choice="arsenal"
        aria-label="Голосовать за Arsenal" aria-pressed="false">
        <span class="hero-art__frame">
          <span class="side-label arsenal">Arsenal</span>
          <img class="img-full" src="assets/arsenal.png" alt="" width="1536" height="1024" />
          <span class="hero-art__shine" aria-hidden="true"></span>
          <span class="hero-art__ring" aria-hidden="true"></span>
          <span class="hero-art__check" aria-hidden="true">✓</span>
        </span>
      </button>

      <div class="vs-row" aria-hidden="true"><span class="vs-badge">VS</span></div>

      <button type="button" class="hero-art hero-art--psg" data-vote-choice="psg"
        aria-label="Голосовать за Paris SG" aria-pressed="false">
        <span class="hero-art__frame">
          <span class="side-label psg">Paris SG</span>
          <img class="img-full" src="assets/psg.png" alt="" width="1536" height="1024" />
          <span class="hero-art__shine" aria-hidden="true"></span>
          <span class="hero-art__ring" aria-hidden="true"></span>
          <span class="hero-art__check" aria-hidden="true">✓</span>
        </span>
      </button>
    </div>

    <div class="bar-track"><div class="bar-fill" data-vote-bar-fill></div></div>
    <div class="stats">
      <span data-vote-stat-arsenal>Arsenal —%</span>
      <span data-vote-stat-psg>PSG —%</span>
    </div>
    <p class="vote-total" data-vote-total>… голосов · обновляется live</p>
    <p class="vote-message" data-vote-message hidden></p>

    <p class="footer">Неофициальный фан-опрос · не связан с УЕФА</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/vote.js"></script>
</body>
</html>
