<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Match polls — World Cup 2026 Fan Vote</title>
  <meta name="description" content="Predict World Cup 2026 match results — group stage fan polls." />
  <link rel="canonical" href="https://pashavleon.github.io/vote/matches.html" />
  <link rel="stylesheet" href="css/hub.css" />
</head>
<body data-page="matches">
  <div class="shell">
    <header class="topbar">
      <a class="logo" href="index.html">FanVote</a>
      <nav class="topnav topnav--split" aria-label="Polls">
        <div class="topnav-polls">
          <a href="winner.html">Winner</a>
          <a href="matches.html" class="is-active">Matches</a>
        </div>
        <a href="arch.html" class="topnav-arch">Archive</a>
      </nav>
    </header>

    <main class="page-main">
      <div class="page-head">
        <h1 class="page-head__title">Match polls</h1>
        <p class="page-head__sub">Pick the winner of each match</p>
      </div>

      <div style="padding: 0 1rem">
        <div class="matches-toolbar">
          <div class="voting-phase" id="voting-phase-label" aria-live="polite">
            <span class="voting-phase__indicator" aria-hidden="true"></span>
            <span class="voting-phase__text">Active voting: <strong>Groups</strong></span>
          </div>
          <div class="stage-dropdown" id="stage-dropdown">
            <button
              type="button"
              class="stage-dropdown__trigger"
              id="stage-dropdown-trigger"
              aria-expanded="false"
              aria-haspopup="listbox"
              aria-controls="stage-filter"
            >
              <svg class="stage-dropdown__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M4 7h16M4 12h16M4 17h16"/>
              </svg>
              <span class="stage-dropdown__text">
                <span class="stage-dropdown__stage" id="stage-dropdown-label">Groups</span>
                <span class="stage-dropdown__hint">Switch tournament stage</span>
              </span>
              <svg class="stage-dropdown__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M6 9l6 6 6-6"/>
              </svg>
            </button>
            <div class="stage-dropdown__menu" id="stage-filter" role="listbox" hidden aria-label="Tournament stage"></div>
          </div>
        </div>
        <div id="matches-container">
          <p class="hub-loading">Loading matches…</p>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/flags.js"></script>
  <script src="js/hub.js"></script>
</body>
</html>
